<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOKYO2026</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
  overflow:hidden;
}

header{
  height:60px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

button,
select,
input,
textarea{
  font:inherit;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{
  background:#2563eb;
  color:white;
}

#mapContainer{
  width:100vw;
  height:calc(100vh - 60px);
  overflow:auto;
  background:#d1d5db;
  position:relative;
}

#mapInner{
  position:relative;
  width:5040px;
  height:3564px;
}

#railmap{
  width:5040px;
  height:3564px;
  display:block;
  user-select:none;
}

.marker{
  position:absolute;
  transform:translate(-50%,-100%);
  font-size:42px;
  cursor:pointer;
  user-select:none;
}

.memo{
  position:absolute;
  right:-12px;
  top:-10px;
  font-size:18px;
  background:white;
  border-radius:999px;
  padding:2px;
}

#panel{
  position:fixed;
  top:80px;
  right:20px;
  width:340px;
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  display:none;
}

#panel.show{
  display:block;
}

.field{
  margin-bottom:12px;
}

.field label{
  display:block;
  margin-bottom:4px;
  font-size:12px;
  color:#666;
}

.field input,
.field textarea,
.field select{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:10px;
}

textarea{
  min-height:100px;
  resize:vertical;
}

.actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
}

.hint{
  position:fixed;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,.75);
  color:white;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  z-index:10;
}
</style>
</head>

<body>

<header>

<button id="addBtn" class="primary">
マーク追加
</button>

<select id="rankSelect">
<option value="love">😍 とっても住みたい</option>
<option value="want">⭐ 住みたい</option>
<option value="low">👀 少し気になる</option>
</select>

<input id="searchInput" placeholder="駅検索">

<span id="status"></span>

</header>

<div id="mapContainer">

<div id="mapInner">

<img
id="railmap"
src="tokyo-railmap.png"
>

</div>

</div>

<div id="panel">

<h2 id="panelTitle">
駅メモ
</h2>

<div class="field">
<label>駅名</label>
<input id="stationInput">
</div>

<div class="field">
<label>ランク</label>

<select id="rankEdit">
<option value="love">😍 とっても住みたい</option>
<option value="want">⭐ 住みたい</option>
<option value="low">👀 少し気になる</option>
</select>

</div>

<div class="field">
<label>メモ</label>
<textarea id="memoInput"></textarea>
</div>

<div class="actions">

<button id="deleteBtn">
削除
</button>

<button id="closeBtn">
閉じる
</button>

<button id="saveBtn" class="primary">
保存
</button>

</div>

</div>

<div class="hint">

マーク追加 → 駅クリック → 保存

</div>

<script>

const GAS_WEB_APP_URL = "";

const rankMap = {
  love:{
    emoji:"😍"
  },
  want:{
    emoji:"⭐"
  },
  low:{
    emoji:"👀"
  }
};

let markers = [];

let adding = false;

let selectedId = null;

const mapInner = document.getElementById("mapInner");

const addBtn = document.getElementById("addBtn");

const rankSelect = document.getElementById("rankSelect");

const panel = document.getElementById("panel");

const stationInput = document.getElementById("stationInput");

const memoInput = document.getElementById("memoInput");

const rankEdit = document.getElementById("rankEdit");

const saveBtn = document.getElementById("saveBtn");

const closeBtn = document.getElementById("closeBtn");

const deleteBtn = document.getElementById("deleteBtn");

const searchInput = document.getElementById("searchInput");

const statusEl = document.getElementById("status");

function uid(){
  return Math.random().toString(36).slice(2);
}

function renderMarkers(){

  document
    .querySelectorAll(".marker")
    .forEach(el=>el.remove());

  const q = searchInput.value.toLowerCase();

  markers.forEach(marker=>{

    if(
      q &&
      !marker.station.toLowerCase().includes(q) &&
      !marker.memo.toLowerCase().includes(q)
    ){
      return;
    }

    const el = document.createElement("div");

    el.className = "marker";

    el.style.left = marker.x + "px";

    el.style.top = marker.y + "px";

    el.textContent =
      rankMap[marker.rank].emoji;

    if(marker.memo){

      const memo = document.createElement("span");

      memo.className = "memo";

      memo.textContent = "✏️";

      el.appendChild(memo);

    }

    el.addEventListener("click",()=>{

      selectedId = marker.id;

      stationInput.value = marker.station;

      memoInput.value = marker.memo;

      rankEdit.value = marker.rank;

      panel.classList.add("show");

    });

    mapInner.appendChild(el);

  });

}

function saveLocal(){

  localStorage.setItem(
    "tokyo2026",
    JSON.stringify(markers)
  );

}

function loadLocal(){

  const data =
    localStorage.getItem("tokyo2026");

  if(data){

    markers = JSON.parse(data);

  }

  renderMarkers();

}

addBtn.addEventListener("click",()=>{

  adding = !adding;

  addBtn.textContent =
    adding ?
    "駅をクリック" :
    "マーク追加";

});

mapInner.addEventListener("click",(e)=>{

  if(!adding){
    return;
  }

  const rect =
    mapInner.getBoundingClientRect();

  const x =
    e.clientX - rect.left;

  const y =
    e.clientY - rect.top;

  markers.push({

    id:uid(),

    x,
    y,

    station:"",

    memo:"",

    rank:rankSelect.value

  });

  adding = false;

  addBtn.textContent =
    "マーク追加";

  renderMarkers();

});

saveBtn.addEventListener("click",()=>{

  const marker =
    markers.find(
      m=>m.id===selectedId
    );

  if(!marker){
    return;
  }

  marker.station =
    stationInput.value;

  marker.memo =
    memoInput.value;

  marker.rank =
    rankEdit.value;

  saveLocal();

  renderMarkers();

  panel.classList.remove("show");

});

closeBtn.addEventListener("click",()=>{

  panel.classList.remove("show");

});

deleteBtn.addEventListener("click",()=>{

  markers =
    markers.filter(
      m=>m.id!==selectedId
    );

  saveLocal();

  renderMarkers();

  panel.classList.remove("show");

});

searchInput.addEventListener(
  "input",
  renderMarkers
);

loadLocal();

</script>

</body>
</html>
